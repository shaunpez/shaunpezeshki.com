        - heading "Technical strategist, writer, and advocate for human rights." [level=1] [ref=e17]
        - generic [ref=e18]:
          - paragraph [ref=e19]: Across consulting, automation, and strategy work, Shaun helps clients turn scattered systems into cleaner workflows, sharper decisions, and better use of the tools they already have.
          - paragraph [ref=e20]: He excels at integrating modern solutions with existing systems, boosting efficiency. Shaun's diverse experience, from individual brands to agencies, enables him to understand varied needs and develop strategic success roadmaps.
          - paragraph [ref=e21]: By combining creativity with technology, Shaun focuses on increasing user engagement and creating impactful business solutions.
          - paragraph [ref=e22]:
